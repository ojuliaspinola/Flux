<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>FLUX — devotional circuitry omnichord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04100b;
    --pcb:#0a3526;        /* board green */
    --trace:#3fe6a6;      /* bright trace */
    --copper:#e3a64b;     /* gold trace / pads */
    --magenta:#ff3aa0;    /* hot pink heart-PCB */
    --crt:#69d4ff;        /* CRT blue glow */
    --silk:#d7efe2;       /* silkscreen off-white */
    --dim:#5f8a78;
    --mono:'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:radial-gradient(circle at 50% 30%, #0b2418 0%, var(--bg) 70%);
    color:var(--silk); font-family:var(--mono);
    overflow:hidden; -webkit-user-select:none; user-select:none;
  }
  #stage{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  #wrap{ position:relative; border-radius:14px;
    box-shadow:0 0 80px rgba(63,230,166,.14), 0 0 0 1px rgba(227,166,75,.30),
               inset 0 0 0 1px rgba(63,230,166,.10); background:#051611; overflow:hidden; }
  #cam, #fx{ position:absolute; top:0; left:0; width:100%; height:100%; }
  #cam{ object-fit:cover; background:#000; transform:scaleX(-1);
    opacity:.20; filter:saturate(.5) hue-rotate(-18deg) contrast(1.06) brightness(.95); }
  #fx{ pointer-events:auto; }   /* NOT mirrored — text stays readable; receives pad clicks */
  /* CRT scanlines */
  #scan{ position:absolute; inset:0; pointer-events:none; z-index:5; mix-blend-mode:overlay; opacity:.5;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.35) 3px, rgba(0,0,0,0) 4px); }

  #hud{ position:absolute; inset:0; pointer-events:none; z-index:6; }
  .panel{ position:absolute; background:rgba(6,28,20,.62); backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px); border:1px solid rgba(227,166,75,.45);
    border-radius:6px; padding:9px 16px; box-shadow:0 0 0 1px rgba(63,230,166,.08) inset; }
  #top{ top:14px; left:50%; transform:translateX(-50%); text-align:center; min-width:230px; }
  #brand{ font-size:9.5px; letter-spacing:.42em; color:var(--copper); font-weight:600; }
  #chordName{ font-size:36px; font-weight:700; line-height:1.05; color:var(--trace);
    text-shadow:0 0 14px rgba(63,230,166,.65), 0 0 30px rgba(63,230,166,.30); transition:all .12s; }
  #chordName.idle{ color:var(--dim); text-shadow:none; }
  #sub{ font-size:10px; color:var(--dim); letter-spacing:.18em; margin-top:3px; text-transform:uppercase;}
  #hint{ bottom:14px; left:50%; transform:translateX(-50%); font-size:11.5px; color:var(--dim);
    text-align:center; letter-spacing:.04em;}
  #hint b{ color:var(--silk); font-weight:600; }
  #hint .mag{ color:var(--magenta); }

  #gate{ position:absolute; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; gap:12px; padding:24px;
    background:radial-gradient(circle at 50% 38%, #0c2a1d 0%, #03100a 76%); }
  #emblem{ width:min(300px,72vw); margin-bottom:4px; }
  #gate h1{ font-size:clamp(44px,11vw,104px); font-weight:700; letter-spacing:.10em;
    background:linear-gradient(110deg,var(--trace),var(--crt) 40%,var(--magenta) 90%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 22px rgba(63,230,166,.35)); }
  #gate .tag{ font-size:10px; letter-spacing:.5em; color:var(--copper); text-transform:uppercase; margin-top:-6px;}
  #gate p{ color:#9fc4b4; max-width:500px; line-height:1.65; font-size:14px; margin-top:6px;}
  #gate p b{ color:var(--trace); font-weight:600; }
  #gate small{ color:var(--dim); font-size:11px; max-width:440px; line-height:1.5; letter-spacing:.02em;}
  #go{ margin-top:8px; cursor:pointer; pointer-events:auto; font-family:var(--mono);
    font-size:15px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#05140e;
    padding:15px 40px; border:none; border-radius:6px;
    background:linear-gradient(120deg,var(--trace),var(--copper));
    box-shadow:0 0 28px rgba(63,230,166,.45), 0 0 0 1px rgba(227,166,75,.6);
    transition:transform .15s, box-shadow .15s; }
  #go:hover{ transform:translateY(-2px); box-shadow:0 0 38px rgba(255,58,160,.5), 0 0 0 1px var(--magenta); }
  #go:active{ transform:scale(.98); }
  .hide{ display:none !important; } .err{ color:#ff7a90 !important; }
</style>
</head>
<body>
  <div id="stage"><div id="wrap">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="fx"></canvas>
    <div id="scan"></div>
  </div></div>

  <div id="hud">
    <div id="top" class="panel">
      <div id="brand">F L U X &nbsp;//&nbsp; O M N I C H O R D</div>
      <div id="chordName" class="idle">—</div>
      <div id="sub">Key of C major</div>
    </div>
    <div id="hint" class="panel"><b>Left</b> = chord pads · <b>Right</b> = strum the harp · <span class="mag">make a fist</span> to let it ring out</div>
  </div>

  <div id="gate">
    <h1>FLUX</h1>
    <button id="go">Start playing</button>
    <small id="gateNote">Allow camera access when prompted · works with one or two hands · turn your sound on</small>
  </div>

<script type="module">
import { FilesetResolver, HandLandmarker }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

/* ===================== Music theory ===================== */
const QUAL = { maj:[0,4,7], min:[0,3,7], dim:[0,3,6] };
const CHORDS = [
  {name:'C',  root:60, q:'maj'}, {name:'Dm', root:62, q:'min'},
  {name:'Em', root:64, q:'min'}, {name:'F',  root:65, q:'maj'},
  {name:'G',  root:67, q:'maj'}, {name:'Am', root:69, q:'min'},
  {name:'B°', root:71, q:'dim'},
];
const m2f = m => 440 * Math.pow(2,(m-69)/12);
function harpMidis(ch){ const iv=QUAL[ch.q], set=new Set();
  for(let o=-1;o<=2;o++) for(const i of iv){ const m=ch.root+i+12*o; if(m>=45&&m<=93) set.add(m); }
  return [...set].sort((a,b)=>a-b); }
function padMidis(ch){ const iv=QUAL[ch.q]; return [ch.root-12, ...iv.map(i=>ch.root+i)]; }

/* ===================== Synth ===================== */
class Synth{
  async init(){
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    await ctx.resume(); this.ctx=ctx;
    this.comp=ctx.createDynamicsCompressor();
    this.master=ctx.createGain(); this.master.gain.value=0.9;
    this.master.connect(this.comp); this.comp.connect(ctx.destination);
    this.dry=ctx.createGain(); this.dry.gain.value=0.85; this.dry.connect(this.master);
    this.verb=ctx.createConvolver(); this.verb.buffer=this.impulse(2.6,2.6);
    this.verbGain=ctx.createGain(); this.verbGain.gain.value=0.6;
    this.verb.connect(this.verbGain); this.verbGain.connect(this.master);
    this.padBus=ctx.createGain(); this.padBus.gain.value=0.0001;   // silent until a hand plays
    this._send(this.padBus);
    this.padVoices=[];
  }
  _send(n){ n.connect(this.dry); n.connect(this.verb); }
  impulse(dur,decay){ const r=this.ctx.sampleRate, len=Math.floor(r*dur);
    const b=this.ctx.createBuffer(2,len,r);
    for(let c=0;c<2;c++){ const d=b.getChannelData(c);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); } return b; }
  pluck(freq,vel){
    const ctx=this.ctx, now=ctx.currentTime;
    const o1=ctx.createOscillator(); o1.type='triangle'; o1.frequency.value=freq;
    const o2=ctx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2.001;
    const g=ctx.createGain(), f=ctx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=900+vel*5200; f.Q.value=0.6;
    const peak=0.22*vel;
    g.gain.setValueAtTime(0.0001,now);
    g.gain.exponentialRampToValueAtTime(peak,now+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,now+1.5);
    o1.connect(g); const o2g=ctx.createGain(); o2g.gain.value=0.35; o2.connect(o2g); o2g.connect(g);
    g.connect(f); this._send(f);
    o1.start(now); o2.start(now); o1.stop(now+1.6); o2.stop(now+1.6);
  }
  setPad(midis){
    const ctx=this.ctx, now=ctx.currentTime;
    for(const v of this.padVoices){ v.g.gain.cancelScheduledValues(now);
      v.g.gain.setTargetAtTime(0.0001,now,0.18); v.o1.stop(now+1.0); v.o2.stop(now+1.0); }
    this.padVoices=[];
    for(const m of midis){ const f=m2f(m);
      const o1=ctx.createOscillator(); o1.type='triangle'; o1.frequency.value=f;
      const o2=ctx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=f*1.004;
      const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1400; lp.Q.value=0.4;
      const g=ctx.createGain(); g.gain.value=0.0001;
      o1.connect(lp); o2.connect(lp); lp.connect(g); g.connect(this.padBus);
      o1.start(now); o2.start(now);
      g.gain.setTargetAtTime(0.045,now,0.25);
      this.padVoices.push({o1,o2,g}); }
  }
  // fade the whole sustained chord up (a hand is playing) or out (fist / hands gone)
  setPadActive(on){
    const now=this.ctx.currentTime;
    this.padBus.gain.cancelScheduledValues(now);
    this.padBus.gain.setTargetAtTime(on?1:0.0001, now, on?0.07:0.5);
  }
}

/* ===================== Hand helpers ===================== */
const CONNECTIONS=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
const TIPS=[4,8,12,16,20], JOINTS=[2,6,10,14,18];
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function openCount(lm){ const w=lm[0]; let n=0;
  for(let i=0;i<5;i++) if(dist(lm[TIPS[i]],w)>dist(lm[JOINTS[i]],w)*1.05) n++; return n; }

/* ===================== App ===================== */
const video=document.getElementById('cam');
const canvas=document.getElementById('fx');
const g=canvas.getContext('2d');
const wrap=document.getElementById('wrap');
const elName=document.getElementById('chordName');

const synth=new Synth();
let landmarker=null, hands=[], lastVT=-1;
let pcb=null, padActive=false;
const handOpen=[];

const CHORD_ZONE_R=0.30, HARP_L=0.34, HARP_R=0.985, HARP_TOP=0.07, HARP_BOT=0.95;

let chordIdx=-1;
let strings=[];
const particles=[];
const handState=[{},{}];

// which key pads are active (mouse-selectable), and whether to hide the deactivated ones
const active=new Array(CHORDS.length).fill(true);
let hideInactive=false;
const mouse={x:-1,y:-1};
function activeIndices(){ const a=[]; for(let i=0;i<CHORDS.length;i++) if(active[i]) a.push(i); return a; }
function displayPads(){ return hideInactive ? activeIndices() : CHORDS.map((_,i)=>i); }
function ensureValidChord(){ if(chordIdx<0||!active[chordIdx]){ const ai=activeIndices(); if(ai.length){ chordIdx=-1; selectChord(ai[0]); } } }
function togglePad(ci){
  if(active[ci]){ if(activeIndices().length<=1) return; active[ci]=false; if(ci===chordIdx) ensureValidChord(); }
  else active[ci]=true;
}
function toggleHide(){ hideInactive=!hideInactive; }
function padLayout(){
  const W=canvas.width, H=canvas.height, dpr=devicePixelRatio;
  const x=10*dpr, w=CHORD_ZONE_R*W-20*dpr, top=6*dpr, bottom=H-58*dpr;
  const pads=displayPads(), ph=(bottom-top)/Math.max(1,pads.length);
  return { W,H,dpr,x,w,top,bottom,pads,ph, btn:{ x, y:H-50*dpr, w, h:42*dpr } };
}

function buildStrings(){
  const ch=CHORDS[Math.max(0,chordIdx)];
  const midis=harpMidis(ch), n=midis.length;
  strings=midis.map((m,i)=>({
    x:HARP_L+(i+0.5)/n*(HARP_R-HARP_L), freq:m2f(m),
    hue:150+i/n*180,            // green → cyan → magenta across the harp
    energy:0,
  }));
  handState.forEach(s=>{ s.idx=null; });
}
function selectChord(i){
  if(i===chordIdx) return;
  chordIdx=i; const ch=CHORDS[i];
  buildStrings(); synth.setPad(padMidis(ch));
  elName.textContent=ch.name;
}
function strumIndex(nx){ const t=(nx-HARP_L)/(HARP_R-HARP_L);
  return Math.max(0,Math.min(strings.length-1,Math.floor(t*strings.length))); }
function pluck(i,vel,px,py){
  const s=strings[i]; if(!s) return;
  synth.pluck(s.freq,vel); s.energy=1;
  const n=Math.floor(vel*5)+2;
  for(let k=0;k<n;k++){ if(particles.length>520) break;
    const a=Math.random()*Math.PI*2, sp=(0.5+Math.random()*2.4)*vel;
    particles.push({x:px,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,hue:s.hue,size:2+Math.random()*3}); }
}

function buildPCB(W,H){
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const x=c.getContext('2d'); x.lineCap='square'; x.lineJoin='miter';
  const grid=Math.max(22,Math.round(W/40));
  x.lineWidth=Math.max(1.1,W/1300);
  const n=Math.round(W*H/8200);
  for(let i=0;i<n;i++){
    const green=Math.random()<0.62;
    x.strokeStyle=green?'rgba(63,230,166,0.16)':'rgba(227,166,75,0.15)';
    let px=Math.round(Math.random()*(W/grid))*grid, py=Math.round(Math.random()*(H/grid))*grid;
    x.beginPath(); x.moveTo(px,py);
    const segs=2+Math.floor(Math.random()*4);
    for(let s=0;s<segs;s++){ if(Math.random()<0.5) px+=(Math.random()<0.5?-1:1)*grid*(1+Math.floor(Math.random()*3));
      else py+=(Math.random()<0.5?-1:1)*grid*(1+Math.floor(Math.random()*3)); x.lineTo(px,py); }
    x.stroke();
    x.fillStyle=green?'rgba(63,230,166,0.34)':'rgba(227,166,75,0.30)';
    x.beginPath(); x.arc(px,py,x.lineWidth*2.0,0,7); x.fill();
  }
  return c;
}

function fitStage(){
  const ar=(video.videoWidth||16)/(video.videoHeight||9);
  const vw=window.innerWidth, vh=window.innerHeight;
  let w=vw, h=vw/ar; if(h>vh){ h=vh; w=vh*ar; }
  wrap.style.width=w+'px'; wrap.style.height=h+'px';
  canvas.width=Math.round(w*devicePixelRatio); canvas.height=Math.round(h*devicePixelRatio);
  pcb=buildPCB(canvas.width,canvas.height);
}
window.addEventListener('resize', fitStage);

function ring(c,x,y,r,lw){ c.lineWidth=lw; c.beginPath(); c.arc(x,y,r,0,7); c.stroke(); }
function rr(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

function draw(){
  const W=canvas.width, H=canvas.height, dpr=devicePixelRatio;
  g.clearRect(0,0,W,H);
  if(pcb){ g.globalAlpha=0.55; g.drawImage(pcb,0,0); g.globalAlpha=1; }

  // --- chord pads (silkscreened PCB pads; mouse-selectable) ---
  const L=padLayout();
  g.textAlign='center'; g.textBaseline='middle';
  for(let k=0;k<L.pads.length;k++){
    const ci=L.pads[k], y=L.top+k*L.ph+4*dpr, hgt=L.ph-8*dpr;
    const sel=ci===chordIdx, deact=!active[ci];
    const hover = mouse.x>=L.x && mouse.x<=L.x+L.w && mouse.y>=y && mouse.y<=y+hgt;
    g.fillStyle = sel?'rgba(255,58,160,0.16)':(deact?'rgba(8,28,21,0.42)':'rgba(8,46,33,0.55)');
    g.strokeStyle = sel?'#ff3aa0':(deact?'rgba(95,138,120,0.42)':'rgba(227,166,75,0.55)');
    g.lineWidth=(sel?2.2:1.3)*dpr;
    g.setLineDash(deact?[5*dpr,4*dpr]:[]);
    g.shadowColor='#ff3aa0'; g.shadowBlur=sel?16*dpr:0;
    rr(g,L.x,y,L.w,hgt,7*dpr); g.fill(); g.stroke(); g.shadowBlur=0; g.setLineDash([]);
    if(hover && !sel){ g.strokeStyle='rgba(215,239,226,0.55)'; g.lineWidth=1.2*dpr;
      rr(g,L.x+2*dpr,y+2*dpr,L.w-4*dpr,hgt-4*dpr,6*dpr); g.stroke(); }
    if(!deact){ g.fillStyle=sel?'#3fe6a6':'rgba(95,138,120,0.5)'; g.shadowColor='#3fe6a6'; g.shadowBlur=sel?12*dpr:0;
      g.beginPath(); g.arc(L.x+12*dpr,y+hgt/2,3.2*dpr,0,7); g.fill(); g.shadowBlur=0; }
    g.fillStyle = deact?'rgba(150,172,160,0.45)':(sel?'#ffd9ee':'rgba(215,239,226,0.7)');
    g.font=`600 ${Math.min(26,L.ph*0.42)*dpr}px IBM Plex Mono, monospace`;
    g.fillText(CHORDS[ci].name, L.x+L.w/2+6*dpr, y+hgt/2);
  }
  // --- show/hide-deactivated toggle button ---
  const b=L.btn, bh = mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h;
  g.fillStyle = bh?'rgba(105,212,255,0.20)':'rgba(6,28,20,0.65)';
  g.strokeStyle='#69d4ff'; g.lineWidth=1.3*dpr; g.setLineDash([]);
  rr(g,b.x,b.y,b.w,b.h,6*dpr); g.fill(); g.stroke();
  g.fillStyle='#c5ecff'; g.font=`600 ${Math.min(12,b.w*0.07)*dpr}px IBM Plex Mono, monospace`;
  g.textAlign='center'; g.textBaseline='middle';
  g.fillText(hideInactive?'SHOW ALL KEYS':'HIDE UNUSED', b.x+b.w/2, b.y+b.h/2);

  // --- harp: traces with solder pads ---
  const topY=HARP_TOP*H, botY=HARP_BOT*H;
  for(const s of strings){
    const x=s.x*W, glow=s.energy;
    const bow=glow*24*dpr*Math.sin(performance.now()/55);
    const col=`hsl(${s.hue},85%,${52+glow*30}%)`;
    g.strokeStyle=`hsla(${s.hue},85%,${52+glow*30}%,${0.30+glow*0.7})`;
    g.lineWidth=(1.3+glow*3.2)*dpr;
    g.shadowColor=col; g.shadowBlur=glow*20*dpr;
    g.beginPath(); g.moveTo(x,topY); g.quadraticCurveTo(x+bow,(topY+botY)/2,x,botY); g.stroke();
    // solder pads (top & bottom)
    g.strokeStyle=`hsla(${s.hue},85%,${55+glow*25}%,${0.5+glow*0.5})`;
    ring(g,x,topY,(4+glow*3)*dpr,(1.4+glow*1.6)*dpr);
    ring(g,x,botY,(4+glow*3)*dpr,(1.4+glow*1.6)*dpr);
    g.fillStyle=col; g.globalAlpha=0.25+glow*0.75;
    g.beginPath(); g.arc(x,topY,1.6*dpr,0,7); g.fill();
    g.beginPath(); g.arc(x,botY,1.6*dpr,0,7); g.fill(); g.globalAlpha=1;
    s.energy*=0.90;
  }
  g.shadowBlur=0;

  // --- particles ---
  g.globalCompositeOperation='lighter';
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
    p.x+=p.vx*dpr; p.y+=p.vy*dpr; p.vy+=0.04*dpr; p.life-=0.025;
    if(p.life<=0){ particles.splice(i,1); continue; }
    g.globalAlpha=p.life; g.fillStyle=`hsl(${p.hue},90%,66%)`;
    g.beginPath(); g.arc(p.x,p.y,p.size*p.life*dpr,0,7); g.fill(); }
  g.globalAlpha=1; g.globalCompositeOperation='source-over';

  // --- hands (bright = playing, dim copper = fist/muted) ---
  hands.forEach((lm,h)=>{
    const open=handOpen[h];
    const c = open?'#3fe6a6':'rgba(227,166,75,0.55)';
    g.strokeStyle=c; g.lineWidth=(open?3:2)*dpr;
    g.shadowColor=open?'#3fe6a6':'transparent'; g.shadowBlur=open?9*dpr:0;
    for(const [a,b] of CONNECTIONS){ g.beginPath();
      g.moveTo((1-lm[a].x)*W,lm[a].y*H); g.lineTo((1-lm[b].x)*W,lm[b].y*H); g.stroke(); }
    g.shadowBlur=0;
    for(let i=0;i<lm.length;i++){ g.fillStyle=TIPS.includes(i)?(open?'#ff3aa0':'rgba(227,166,75,0.6)'):c;
      g.beginPath(); g.arc((1-lm[i].x)*W,lm[i].y*H,(TIPS.includes(i)?5.5:3)*dpr,0,7); g.fill(); }
  });
}

function loop(){
  const now=performance.now();
  if(landmarker && video.readyState>=2 && video.currentTime!==lastVT){
    lastVT=video.currentTime;
    try{ hands=(landmarker.detectForVideo(video,now).landmarks)||[]; }catch(e){}
  }

  const n=hands.length; handOpen.length=0; let anyActive=false;
  for(let h=0;h<2;h++){
    const st=handState[h];
    if(h>=n){ st.idx=null; st.inHarp=false; continue; }
    const lm=hands[h];
    const open=openCount(lm)>=2; handOpen[h]=open;
    if(!open){ st.idx=null; st.inHarp=false; continue; }   // fist → no new notes
    anyActive=true;
    const tip=lm[8], nx=1-tip.x, ny=tip.y;
    if(nx<CHORD_ZONE_R){
      st.inHarp=false; st.idx=null;
      const L=padLayout(), py=ny*canvas.height;
      if(py>=L.top && py<=L.bottom && L.pads.length){
        const k=Math.max(0,Math.min(L.pads.length-1,Math.floor((py-L.top)/L.ph)));
        const ci=L.pads[k]; if(active[ci]) selectChord(ci);
      }
    } else if(nx>=HARP_L && nx<=HARP_R){
      if(chordIdx<0) ensureValidChord();
      const idx=strumIndex(nx), px=(1-tip.x)*canvas.width, py=ny*canvas.height;
      if(!st.inHarp || st.idx===null){ pluck(idx,0.7,px,py); }
      else if(idx!==st.idx){
        const step=idx>st.idx?1:-1, vel=Math.min(1,0.5+Math.abs(nx-(st.nx??nx))*5);
        let cnt=0; for(let s=st.idx+step; s!==idx+step && cnt<8; s+=step,cnt++) pluck(s,vel,px,py);
      }
      st.inHarp=true; st.idx=idx; st.nx=nx;
    } else { st.inHarp=false; st.idx=null; }
  }

  if(anyActive!==padActive){ if(synth.ctx) synth.setPadActive(anyActive); padActive=anyActive; }
  elName.classList.toggle('idle', !anyActive);

  draw();
  requestAnimationFrame(loop);
}

// --- mouse / touch: select active key pads + toggle hide ---
function evtToCanvas(e){ const r=canvas.getBoundingClientRect();
  return { x:(e.clientX-r.left)/r.width*canvas.width, y:(e.clientY-r.top)/r.height*canvas.height }; }
canvas.addEventListener('pointermove', e=>{ const p=evtToCanvas(e); mouse.x=p.x; mouse.y=p.y; });
canvas.addEventListener('pointerleave', ()=>{ mouse.x=-1; mouse.y=-1; });
canvas.addEventListener('pointerdown', e=>{
  const p=evtToCanvas(e), L=padLayout();
  if(p.x>=L.btn.x && p.x<=L.btn.x+L.btn.w && p.y>=L.btn.y && p.y<=L.btn.y+L.btn.h){ toggleHide(); return; }
  if(p.x>=L.x && p.x<=L.x+L.w && p.y>=L.top && p.y<=L.bottom){
    const k=Math.floor((p.y-L.top)/L.ph), ci=L.pads[k];
    if(ci!=null) togglePad(ci);
  }
});

const gate=document.getElementById('gate'), note=document.getElementById('gateNote');
document.getElementById('go').addEventListener('click', async ()=>{
  const btn=document.getElementById('go'); btn.disabled=true; btn.textContent='Starting…';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} } });
    video.srcObject=stream; await video.play();
    await new Promise(r=>{ if(video.videoWidth) r(); else video.onloadedmetadata=r; });
    fitStage();
    await synth.init();
    selectChord(0); padActive=false;
    note.textContent='Loading hand-tracking model…';
    const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    landmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{ modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate:"GPU" },
      runningMode:"VIDEO", numHands:2 });
    gate.classList.add('hide');
    loop();
  }catch(err){
    console.error(err); btn.disabled=false; btn.textContent='Try again'; note.classList.add('err');
    note.textContent=(err && err.name==='NotAllowedError')
      ? 'Camera permission was denied. Allow access and try again.'
      : 'Could not start: '+(err && err.message ? err.message : err);
  }
});
</script>
